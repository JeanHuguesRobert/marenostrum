<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 500" width="680" height="500" font-family="Georgia, 'Times New Roman', serif">

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5f5e5a"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-accent" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#2b4a8c"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="500" fill="#faf9f6"/>

  <!-- Title -->
  <text x="340" y="36" text-anchor="middle"
    font-size="15" font-weight="bold" fill="#1a1916" letter-spacing="0.02em">
    A Three-Layer Architecture for Structural AI Safety
  </text>
  <text x="340" y="54" text-anchor="middle"
    font-size="11" fill="#6b6a65" font-style="italic">
    MareNostrum Framework · Robert (2026)
  </text>

  <!-- ═══ LAYER 3 — Model (top) ═══ -->
  <rect x="40" y="72" width="420" height="76" rx="8"
    fill="#f0ede6" stroke="#b4b2a9" stroke-width="0.8"/>
  <text x="60" y="97" font-size="10" font-weight="bold" fill="#5f5e5a"
    font-family="'Courier New', monospace" letter-spacing="0.08em">LAYER 3 — MODEL</text>
  <text x="60" y="116" font-size="14" font-weight="bold" fill="#2c2c2a">
    Weights · alignment · interpretability
  </text>
  <text x="60" y="135" font-size="12" fill="#5f5e5a" font-style="italic">
    RLHF, constitutional AI, scalable oversight
  </text>

  <!-- Current focus badge -->
  <rect x="302" y="78" width="150" height="22" rx="4"
    fill="#2b4a8c" stroke="none"/>
  <text x="377" y="93" text-anchor="middle"
    font-size="10" font-weight="bold" fill="#ffffff" letter-spacing="0.04em">
    current AI Safety focus
  </text>

  <!-- Safety property — Layer 3 -->
  <text x="476" y="103" font-size="11" fill="#6b6a65" font-style="italic">behavioural</text>
  <text x="476" y="118" font-size="11" fill="#6b6a65" font-style="italic">constraints</text>

  <!-- ═══ GAP INDICATOR ═══ -->
  <line x1="250" y1="150" x2="250" y2="168"
    stroke="#2b4a8c" stroke-width="1.5" stroke-dasharray="4 3"
    marker-end="url(#arr-accent)"/>
  <text x="265" y="163" font-size="10" fill="#2b4a8c" font-style="italic">
    safety gap — this paper's claim
  </text>

  <!-- ═══ LAYER 2 — Governance (middle) ═══ -->
  <rect x="40" y="170" width="420" height="76" rx="8"
    fill="#e1f5ee" stroke="#1d9e75" stroke-width="0.8"/>
  <text x="60" y="195" font-size="10" font-weight="bold" fill="#0f6e56"
    font-family="'Courier New', monospace" letter-spacing="0.08em">LAYER 2 — GOVERNANCE</text>
  <text x="60" y="214" font-size="14" font-weight="bold" fill="#04342c">
    Fractal assemblies · imperative mandates
  </text>
  <text x="60" y="233" font-size="12" fill="#0f6e56" font-style="italic">
    revocable delegation · open-source invariant · anti-capture rules
  </text>

  <!-- Safety property — Layer 2 -->
  <text x="476" y="201" font-size="11" fill="#0f6e56" font-style="italic">democratic</text>
  <text x="476" y="216" font-size="11" fill="#0f6e56" font-style="italic">accountability</text>

  <!-- Arrow layer 2 → layer 1 -->
  <line x1="250" y1="248" x2="250" y2="266"
    stroke="#5f5e5a" stroke-width="1"
    marker-end="url(#arr)"/>

  <!-- ═══ LAYER 1 — Physical substrate (bottom) ═══ -->
  <rect x="40" y="268" width="420" height="76" rx="8"
    fill="#eeedfe" stroke="#7f77dd" stroke-width="0.8"/>
  <text x="60" y="293" font-size="10" font-weight="bold" fill="#534ab7"
    font-family="'Courier New', monospace" letter-spacing="0.08em">LAYER 1 — PHYSICAL SUBSTRATE</text>
  <text x="60" y="312" font-size="14" font-weight="bold" fill="#26215c">
    Solar exergy · territorial compute
  </text>
  <text x="60" y="331" font-size="12" fill="#534ab7" font-style="italic">
    exergy token · energy sovereignty · material traceability
  </text>

  <!-- Safety property — Layer 1 -->
  <text x="476" y="299" font-size="11" fill="#534ab7" font-style="italic">material</text>
  <text x="476" y="314" font-size="11" fill="#534ab7" font-style="italic">traceability</text>

  <!-- Right column header -->
  <text x="476" y="80" font-size="10" fill="#6b6a65"
    font-family="'Courier New', monospace" letter-spacing="0.06em">SAFETY PROPERTY</text>
  <line x1="469" y1="72" x2="469" y2="344"
    stroke="#d4d2cb" stroke-width="0.6"/>

  <!-- ═══ ANTIFRAGILITY NOTE ═══ -->
  <rect x="40" y="362" width="600" height="34" rx="6"
    fill="none" stroke="#d4d2cb" stroke-width="0.8" stroke-dasharray="5 3"/>
  <text x="340" y="380" text-anchor="middle"
    font-size="11" fill="#6b6a65" font-style="italic">
    Antifragile property: structural safety constraints strengthen under stress, not despite it
  </text>
  <text x="340" y="393" text-anchor="middle"
    font-size="10" fill="#8a8880">
    (Taleb, 2012 · applied to compute governance)
  </text>

  <!-- ═══ ANALOGY ROW ═══ -->
  <!-- Left box -->
  <rect x="40" y="414" width="270" height="56" rx="7"
    fill="#faece7" stroke="#d85a30" stroke-width="0.8"/>
  <text x="175" y="436" text-anchor="middle"
    font-size="12" font-weight="bold" fill="#4a1b0c">
    "Attention is all you need"
  </text>
  <text x="175" y="455" text-anchor="middle"
    font-size="11" fill="#993c1d" font-style="italic">
    one insight rewired the field
  </text>
  <text x="175" y="466" text-anchor="middle"
    font-size="10" fill="#993c1d">
    Vaswani et al., 2017
  </text>

  <!-- Arrow between analogies -->
  <line x1="318" y1="442" x2="350" y2="442"
    stroke="#5f5e5a" stroke-width="1.2"
    marker-end="url(#arr)"/>
  <text x="334" y="435" text-anchor="middle"
    font-size="9" fill="#8a8880">analogous</text>
  <text x="334" y="455" text-anchor="middle"
    font-size="9" fill="#8a8880">claim</text>

  <!-- Right box -->
  <rect x="358" y="414" width="282" height="56" rx="7"
    fill="#e1f5ee" stroke="#1d9e75" stroke-width="0.8"/>
  <text x="499" y="436" text-anchor="middle"
    font-size="12" font-weight="bold" fill="#04342c">
    "Infrastructure is all you need"
  </text>
  <text x="499" y="455" text-anchor="middle"
    font-size="11" fill="#0f6e56" font-style="italic">
    control the substrate, shape the safety
  </text>
  <text x="499" y="466" text-anchor="middle"
    font-size="10" fill="#0f6e56">
    Robert, 2026 · MareNostrum
  </text>

  <!-- Bottom caption -->
  <text x="340" y="492" text-anchor="middle"
    font-size="9" fill="#b4b2a9" font-style="italic">
    github.com/JeanHuguesRobert/marenostrum — C.O.R.S.I.C.A. / Institut Mariani R&amp;D — Corte, Corsica
  </text>

</svg>
