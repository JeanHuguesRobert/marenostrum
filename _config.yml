title: "Cogentia Corpus — marenostrum"
description: "Distributed research and governance."
remote_theme: just-the-docs/just-the-docs

color_scheme: dark

# Cogentia structure
aux_links:
  "Cogentia README": "https://github.com/JeanHuguesRobert/cogentia"

# Plugins (tous supportés sur GitHub Pages)
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-relative-links
  - jekyll-sitemap
  # - jekyll-feed     # décommente si tu veux un flux RSS/Atom plus tard

# Disable default Jekyll behavior that might interfere with raw Markdown files
exclude:
  - ".cogentiaignore"
  - ".git/"
  - "node_modules/"
